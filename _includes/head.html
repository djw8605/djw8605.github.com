<meta charset="utf-8">

{% include seo.html %}

{% unless site.atom_feed.hide %}
  <link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ '/feed.xml' | relative_url }}{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">
{% endunless %}

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>

<script>
  (function () {
    var storageKey = 'theme-preference';
    var storedTheme = null;
    var resolvedTheme = 'light';

    try {
      storedTheme = localStorage.getItem(storageKey);
    } catch (err) {
      storedTheme = null;
    }

    if (storedTheme !== 'light' && storedTheme !== 'dark') {
      storedTheme = 'system';
    }

    if (storedTheme === 'dark') {
      resolvedTheme = 'dark';
    } else if (storedTheme === 'light') {
      resolvedTheme = 'light';
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      resolvedTheme = 'dark';
    }

    document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');
    document.documentElement.setAttribute('data-theme', resolvedTheme);
    document.documentElement.style.colorScheme = resolvedTheme;
  })();
</script>

<link rel="stylesheet" href="{% include cache-bust.html path='/assets/css/tailwind.css' %}">
<link rel="stylesheet" href="{% include cache-bust.html path='/assets/css/main.css' %}">

{% if site.head_scripts %}
  {% for script in site.head_scripts %}
    <script src="{{ script | relative_url }}"></script>
  {% endfor %}
{% endif %}
