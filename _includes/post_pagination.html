{% if page.previous or page.next %}
  <nav class="grid gap-3 sm:grid-cols-2" aria-label="Post navigation">
    {% if page.previous %}
      <a href="{{ page.previous.url | relative_url }}" class="rounded-lg ring-1 ring-slate-200 p-4 shadow-sm transition hover:ring-slate-400 dark:ring-slate-800 dark:hover:ring-slate-600">
        <p class="font-mono text-xs uppercase tracking-[0.14em] text-slate-500 dark:text-slate-400">Previous</p>
        <p class="mt-1 font-semibold text-slate-900 dark:text-slate-100">{{ page.previous.title | markdownify | strip_html }}</p>
      </a>
    {% else %}
      <span class="rounded-lg ring-1 ring-slate-200 p-4 opacity-55 dark:ring-slate-800">
        <p class="font-mono text-xs uppercase tracking-[0.14em] text-slate-500 dark:text-slate-400">Previous</p>
        <p class="mt-1 font-semibold text-slate-700 dark:text-slate-200">None</p>
      </span>
    {% endif %}

    {% if page.next %}
      <a href="{{ page.next.url | relative_url }}" class="rounded-lg ring-1 ring-slate-200 p-4 text-left shadow-sm transition hover:ring-slate-400 dark:ring-slate-800 dark:hover:ring-slate-600 sm:text-right">
        <p class="font-mono text-xs uppercase tracking-[0.14em] text-slate-500 dark:text-slate-400">Next</p>
        <p class="mt-1 font-semibold text-slate-900 dark:text-slate-100">{{ page.next.title | markdownify | strip_html }}</p>
      </a>
    {% else %}
      <span class="rounded-lg ring-1 ring-slate-200 p-4 opacity-55 dark:ring-slate-800 sm:text-right">
        <p class="font-mono text-xs uppercase tracking-[0.14em] text-slate-500 dark:text-slate-400">Next</p>
        <p class="mt-1 font-semibold text-slate-700 dark:text-slate-200">None</p>
      </span>
    {% endif %}
  </nav>
{% endif %}
