---
layout: default
---

<div class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:py-12">
  <section class="rounded-lg ring-1 ring-slate-200 p-6 shadow-sm dark:bg-slate-950/60 dark:ring-slate-600/75 sm:p-8 lg:p-10">
    {% if page.title %}
      <h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-100 sm:text-[2.8rem]">{{ page.title }}</h1>
    {% endif %}
    {% if page.excerpt %}
      <p class="mt-4 text-lg text-slate-600 dark:text-slate-300">{{ page.excerpt }}</p>
    {% endif %}
    <div class="mt-8 space-y-7">
      {{ content }}
    </div>
  </section>
</div>
